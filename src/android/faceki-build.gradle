// faceki-build.gradle (applied via <framework type="gradleReference">)
allprojects {
    repositories {
        maven { url 'https://jitpack.io' }   // FACEKI publishes to JitPack
    }
}

dependencies {
    // Pin an SDK tag released by FACEKI, e.g., 1.0.3 or similar
    implementation 'com.github.faceki:blaze-android-sdk:<Tag>'
}
